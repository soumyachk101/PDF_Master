[phases.setup]
nixPkgs = ["node", "libreoffice", "poppler_utils", "libutil"]

# Install, Build, and Start are now handled by the root package.json scripts
# but we keep these explicit to ensure Railway's Railpack builder is bypassed or correctly guided.

[phases.install]
cmds = ["npm install --prefix backend"]

[phases.build]
cmds = ["npm run build --prefix backend --if-present"]

[start]
cmd = "npm start --prefix backend"
